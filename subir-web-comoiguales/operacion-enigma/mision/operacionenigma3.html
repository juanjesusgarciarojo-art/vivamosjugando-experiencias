<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Operación Enigma - Misión 3</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>

<body style="background-color: #000; color: #00ffcc; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0;">

    <div id="agency-container" style="display: block;">
        <header class="agency-header">
            <div class="header-left">
                <img src="escudo.png" alt="Escudo" class="agency-logo-small">
                <h1>LA ORDEN</h1>
            </div>

            <div class="timer-container">
                <span id="countdown-timer">02:00:00</span>
            </div>

            <div class="status-indicator" style="display: flex; align-items: center; gap: 20px;">
                <div><span class="pulse-dot"></span> SECURE CONNECTION</div>
                <button class="agency-btn btn-finish" onclick="window.location.href='index.html'">
                    <span>⬅</span> VOLVER A BASE
                </button>
            </div>
        </header>

        <div class="agency-layout">
            <!-- Sidebar Navigation -->
            <aside class="agency-sidebar glass-panel">
                <nav class="agency-nav">
                    <button class="nav-btn" onclick="window.location.href='index.html'">
                        <span class="nav-icon">⎈</span> PANEL CENTRAL
                    </button>
                    <button class="nav-btn" onclick="window.location.href='index.html?tab=archivos'">
                        <span class="nav-icon">▤</span> ARCHIVOS CLASIFICADOS
                    </button>
                    <button class="nav-btn" onclick="window.location.href='index.html?tab=comunicaciones'">
                        <span class="nav-icon">☎</span> CUARTEL GENERAL
                    </button>
                    <button class="nav-btn" onclick="window.location.href='index.html?tab=red-global'">
                        <span class="nav-icon">◈</span> RED GLOBAL
                    </button>
                </nav>
                <div class="agent-stats-container">
                    <div class="radar-panel">
                        <div class="radar-box">
                            <div class="radar-grid"></div>
                            <div class="radar-sweep"></div>
                            <div class="radar-dot d1"></div>
                            <div class="radar-dot d2"></div>
                            <div class="radar-dot d3"></div>
                        </div>
                        <div class="radar-coords" id="radar-coords">
                            <span class="rc rc1" id="rc1"></span>
                            <span class="rc rc2" id="rc2"></span>
                            <span class="rc rc3" id="rc3"></span>
                        </div>
                    </div>
                    <div class="agent-stats">
                        <p>STATUS: <span style="color: #33ff33;">ONLINE</span></p>
                        <p>MISIONES HOY: <span style="color: #00ffcc;">14</span></p>
                        <p>AGS CONECTADOS: <span id="connected-agents">--</span></p>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="agency-content glass-panel">

                <div id="tab-dashboard" class="tab-content active-tab" style="display: block;">
                    <button class="agency-btn small-btn" onclick="window.location.href='index.html'" style="margin-bottom: 20px;">⬅ VOLVER</button>
                    
                    <h3 style="color: #00ffcc; text-transform: uppercase;">[TÍTULO DE MISIÓN 3]</h3>
                    
                    <div class="mission-details" style="border-left-color: #00aaff; background: rgba(0, 170, 255, 0.05); margin-top: 15px; margin-bottom: 25px;">
                        <h3 style="color: #00aaff;">INSTRUCCIONES CLASIFICADAS</h3>
                        <p>[Aquí incluiremos la información y tareas asignadas a la Operación Enigma 3]</p>
                    </div>

                    <div style="margin-bottom: 30px; margin-top: 20px;">
                        <!-- Espacio reservado para mapa si fuera necesario -->
                    </div>

                </div>

            </main>
        </div>
    </div>
    
    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const GROUP_ID = "grupo_activo";
        let timerPaused = false;
        let timerInterval = null;

        // --- LÓGICA DEL CRONÓMETRO ---
        function initTimer() {
            const timerElement = document.getElementById('countdown-timer');
            if (!timerElement) return;

            const groupRef = doc(db, "grupos", GROUP_ID);

            onSnapshot(groupRef, (snapshot) => {
                if (!snapshot.exists()) return;
                const data = snapshot.data();
                
                if (data.pausado) {
                    timerPaused = true;
                    if (timerInterval) clearInterval(timerInterval);
                    timerElement.style.color = "#888";
                    timerElement.style.textShadow = "none";
                } else {
                    timerPaused = false;
                    timerElement.style.color = "#ff3333";
                    timerElement.style.textShadow = "0 0 8px rgba(255, 51, 51, 0.6)";
                    
                    if (data.tiempo_inicio) {
                        const extraMs = data.energia_reclamada ? (10 * 60 * 1000) : 0;
                        const duration = (2 * 60 * 60 * 1000) + extraMs;
                        const calculatedEnd = data.tiempo_inicio.toDate().getTime() + duration;
                        localStorage.setItem('timer_end_time', calculatedEnd);
                        
                        if (timerInterval) clearInterval(timerInterval);
                        timerInterval = setInterval(updateTimer, 1000);
                        updateTimer();
                    }
                }
            });

            function updateTimer() {
                if (timerPaused) return;

                let endTime = localStorage.getItem('timer_end_time');
                if (!endTime) return;
                endTime = parseInt(endTime, 10);

                const now = Date.now();
                const diff = endTime - now;

                if (diff <= 0) {
                    const overTime = Math.abs(diff);
                    const oh = Math.floor(overTime / (1000 * 60 * 60));
                    const om = Math.floor((overTime % (1000 * 60 * 60)) / (1000 * 60));
                    const os = Math.floor((overTime % (1000 * 60)) / 1000);
                    timerElement.innerText = "+" + (oh<10?"0"+oh:oh) + ":" + (om<10?"0"+om:om) + ":" + (os<10?"0"+os:os);
                    timerElement.style.color = "#ffaa00";
                    return;
                }

                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                timerElement.innerText = (h<10?"0"+h:h) + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);
            }
        }
        initTimer();

        // --- DECORACIÓN (RADAR Y AGENTES) ---
        function startRadarCoords() {
            const slots = [
                { el: document.getElementById('rc1'), delay: 500 },
                { el: document.getElementById('rc2'), delay: 1200 },
                { el: document.getElementById('rc3'), delay: 2500 },
            ];
            function randCoord() {
                return (38 + Math.random() * 5).toFixed(4) + "N " + (-5 + Math.random() * -2).toFixed(4) + "W /" + Math.floor(Math.random() * 900 + 100) + "m";
            }
            slots.forEach(slot => {
                if (!slot.el) return;
                const cycle = () => {
                    slot.el.textContent = randCoord();
                    slot.el.classList.add('visible');
                    setTimeout(() => slot.el.classList.remove('visible'), 1500);
                    setTimeout(cycle, 2500 + Math.random() * 1000);
                };
                setTimeout(cycle, slot.delay);
            });
        }
        startRadarCoords();

        function randomizeAgents() {
            const agentEl = document.getElementById('connected-agents');
            if (agentEl) agentEl.innerText = Math.floor(Math.random() * (450 - 320 + 1) + 320);
            setTimeout(randomizeAgents, 5000 + Math.random() * 5000);
        }
        randomizeAgents();
    </script>
</body>

</html>
